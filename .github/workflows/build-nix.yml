on:
  workflow_dispatch: ~
  schedule:
    # 7:25 on Sundays
    - cron: '25 7 * * 0'
  push:
    paths:
      - 'NixOS/**.nix'
      - 'NixOS/flake.lock'
      - '.github/workflows/build-nix.yml'

jobs:
  build-nix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-latest
            system: aarch64-darwin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          name: skyenet
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Build packages
        run: |
          nix develop ./NixOS \
            --command nix-fast-build \
            --flake ./NixOS#packages.${{ matrix.system }} \
            --systems ${{ matrix.system }} \
            --skip-cached \
            --cachix-cache=skyenet \
            --no-link

      # TODO: Add to NUR
      # - name: Trigger NUR update
      #   run: curl -X POST "https://nur-update.nix-community.org/update?repo=skyenet"
