on:
  workflow_dispatch: ~
  push:
    paths:
      - 'NixOS/**.nix'
      - '.github/workflows/build-nix.yml'

jobs:
  build-nix:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # cachix/install-nix-action@v31.10.6
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      # cachix/cachix-action@v17
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          name: skyenet
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build packages
        run: |
          # These shouldn't trigger an action failure
          nix build --print-build-logs ./NixOS#anemoi       || echo "ERROR!"
          nix build --print-build-logs ./NixOS#ascsaver     || echo "ERROR!"
          nix build --print-build-logs ./NixOS#browsertrix-crawler || echo "ERROR!"
          nix build --print-build-logs ./NixOS#cdash        || echo "ERROR!"
          nix build --print-build-logs ./NixOS#porkbun-ddns || echo "ERROR!"
          nix build --print-build-logs ./NixOS#reddio       || echo "ERROR!"
          nix build --print-build-logs ./NixOS#romm         || echo "ERROR!"
          nix build --print-build-logs ./NixOS#sbuild       || echo "ERROR!"
          nix build --print-build-logs ./NixOS#tmux-notify  || echo "ERROR!"
          nix build --print-build-logs ./NixOS#bencher      || echo "ERROR!"
          nix build --print-build-logs ./NixOS#rsbinder     || echo "ERROR!"

          # These should
          nix build --print-build-logs ./NixOS#ambient-ci
          nix build --print-build-logs ./NixOS#barry
          nix build --print-build-logs ./NixOS#radicle-ci-ambient
          nix build --print-build-logs ./NixOS#subplot
          nix build --print-build-logs ./NixOS#vmdb2

          # Linux exclusive
          nix build --print-build-logs ./NixOS#keylime      || echo "ERROR!"
          nix build --print-build-logs ./NixOS#rust-keylime || echo "ERROR!"
  build-nix-macos:
    runs-on: macos-latest
    steps:
      # actions/checkout@v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # cachix/install-nix-action@v31.10.6
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      # cachix/cachix-action@v17
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          name: skyenet
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build packages
        run: |
          # These shouldn't trigger an action failure
          nix build --print-build-logs ./NixOS#anemoi       || echo "ERROR!"
          nix build --print-build-logs ./NixOS#ascsaver     || echo "ERROR!"
          nix build --print-build-logs ./NixOS#browsertrix-crawler || echo "ERROR!"
          nix build --print-build-logs ./NixOS#cdash        || echo "ERROR!"
          nix build --print-build-logs ./NixOS#porkbun-ddns || echo "ERROR!"
          nix build --print-build-logs ./NixOS#reddio       || echo "ERROR!"
          nix build --print-build-logs ./NixOS#romm         || echo "ERROR!"
          nix build --print-build-logs ./NixOS#sbuild       || echo "ERROR!"
          nix build --print-build-logs ./NixOS#tmux-notify  || echo "ERROR!"
          nix build --print-build-logs ./NixOS#bencher      || echo "ERROR!"
          nix build --print-build-logs ./NixOS#rsbinder     || echo "ERROR!"

          # These should
          nix build --print-build-logs ./NixOS#ambient-ci
          nix build --print-build-logs ./NixOS#barry
          nix build --print-build-logs ./NixOS#radicle-ci-ambient
          nix build --print-build-logs ./NixOS#subplot
          nix build --print-build-logs ./NixOS#vmdb2

