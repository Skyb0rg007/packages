on:
  workflow_dispatch: ~
  schedule:
    # 7:25 on Sundays
    - cron: '25 7 * * 0'
  push:
    paths:
      - 'NixOS/**.nix'
      - '.github/workflows/build-nix.yml'

jobs:
  build-nix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          name: skyenet
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build packages
        run: |
          nix-build ./NixOS/ci.nix -A cacheOutputs --no-out-link --keep-going
      # TODO: Add to NUR
      # - name: Trigger NUR update
      #   run: curl -X POST "https://nur-update.nix-community.org/update?repo=skyenet"
